name: driver_portal
description: Driver Portal - Logistics Platform (FASTTRACK). Login with Tanzania phone and password.
publish_to: 'none'
version: 4.22.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.0.0
  google_fonts: ^8.0.1
  cupertino_icons: ^1.0.6
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  permission_handler: ^11.0.1
  audioplayers: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  # Add your logo at assets/images/logo.png then use it on the login page
  assets:
    - assets/images/
    - assets/sounds/
